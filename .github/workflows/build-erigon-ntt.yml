name: Build erigon-ntt Docker image

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/build-erigon-ntt.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout erigon (Giulio2002 docker_pq-precompiles)
        uses: actions/checkout@v4
        with:
          repository: Giulio2002/erigon
          ref: docker_pq-precompiles

      - name: Build and push erigon-ntt
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/silence-laboratories/erigon-ntt:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
